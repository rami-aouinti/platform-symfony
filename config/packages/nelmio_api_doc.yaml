when@dev: &dev
    nelmio_api_doc:
        documentation:
            openapi: '3.0.0'
            servers:
                -   url: http://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTP
                -   url: https://{domain}
                    variables:
                        domain:
                            default: localhost
                    description: API over HTTPS
            info:
                title: Symfony Api
                description: This is an symfony api environment example
                version: 3.9.0
            components:
                securitySchemes:
                    Bearer:
                        type: http
                        scheme: bearer
                        bearerFormat: JWT
                    ApiKey:
                        type: apiKey
                        name: Authorization
                        description: 'Value: ApiKey {token}'
                        in: header
                schemas:
                    AccessConstraint:
                        type: object
                        properties:
                            audience:
                                type: string
                                example: 'Me'
                            minimumRole:
                                type: string
                                example: 'IS_AUTHENTICATED_FULLY'
                            dataScope:
                                type: string
                                example: 'Ressources accessibles à l’utilisateur connecté.'
                    ErrorEnvelope:
                        type: object
                        properties:
                            code:
                                type: integer
                                example: 403
                            message:
                                type: string
                                example: Access denied
                responses:
                    BadRequestError:
                        description: 'La requête est invalide (paramètres ou payload).'
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/ErrorEnvelope'
                                example:
                                    code: 400
                                    message: Invalid request payload
                    UnauthorizedError:
                        description: 'Authentification requise ou jeton invalide.'
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/ErrorEnvelope'
                                example:
                                    code: 401
                                    message: JWT Token not found
                    ForbiddenError:
                        description: 'Accès refusé pour le rôle courant.'
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/ErrorEnvelope'
                                example:
                                    code: 403
                                    message: Access denied
                    NotFoundError:
                        description: 'Ressource introuvable.'
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/ErrorEnvelope'
                                example:
                                    code: 404
                                    message: Not found
                    ValidationError:
                        description: 'Erreur de validation métier (contrainte fonctionnelle).'
                        content:
                            application/json:
                                schema:
                                    $ref: '#/components/schemas/ErrorEnvelope'
                                example:
                                    code: 422
                                    message: Validation failed
            security:
                -   Bearer: []
                -   ApiKey: []
        models:
            names:
                - { alias: ApiKey, type: App\ApiKey\Domain\Entity\ApiKey }
                - { alias: BlogComment, type: App\Blog\Domain\Entity\BlogComment }
                - { alias: BlogPost, type: App\Blog\Domain\Entity\BlogPost }
                - { alias: BlogPostLink, type: App\Blog\Domain\Entity\BlogPostLink }
                - { alias: BlogTag, type: App\Blog\Domain\Entity\BlogTag }
                - { alias: Event, type: App\Calendar\Domain\Entity\Event }
                - { alias: ChatMessage, type: App\Chat\Domain\Entity\ChatMessage }
                - { alias: Conversation, type: App\Chat\Domain\Entity\Conversation }
                - { alias: ConversationParticipant, type: App\Chat\Domain\Entity\ConversationParticipant }
                - { alias: Company, type: App\Company\Domain\Entity\Company }
                - { alias: CompanyMembership, type: App\Company\Domain\Entity\CompanyMembership }
                - { alias: Configuration, type: App\Configuration\Domain\Entity\Configuration }
                - { alias: DateDimension, type: App\DateDimension\Domain\Entity\DateDimension }
                - { alias: GeneralAddress, type: App\General\Domain\Entity\Address }
                - { alias: City, type: App\General\Domain\Entity\City }
                - { alias: Region, type: App\General\Domain\Entity\Region }
                - { alias: LogLogin, type: App\Log\Domain\Entity\LogLogin }
                - { alias: LogLoginFailure, type: App\Log\Domain\Entity\LogLoginFailure }
                - { alias: LogRequest, type: App\Log\Domain\Entity\LogRequest }
                - { alias: Media, type: App\Media\Domain\Entity\Media }
                - { alias: Notification, type: App\Notification\Domain\Entity\Notification }
                - { alias: Quiz, type: App\Quiz\Domain\Entity\Quiz }
                - { alias: CandidateProfile, type: App\Recruit\Domain\Entity\CandidateProfile }
                - { alias: JobApplication, type: App\Recruit\Domain\Entity\JobApplication }
                - { alias: JobCategory, type: App\Recruit\Domain\Entity\JobCategory }
                - { alias: JobOffer, type: App\Recruit\Domain\Entity\JobOffer }
                - { alias: Language, type: App\Recruit\Domain\Entity\Language }
                - { alias: Offer, type: App\Recruit\Domain\Entity\Offer }
                - { alias: Resume, type: App\Recruit\Domain\Entity\Resume }
                - { alias: ResumeEducation, type: App\Recruit\Domain\Entity\ResumeEducation }
                - { alias: ResumeExperience, type: App\Recruit\Domain\Entity\ResumeExperience }
                - { alias: ResumeLanguage, type: App\Recruit\Domain\Entity\ResumeLanguage }
                - { alias: ResumeProject, type: App\Recruit\Domain\Entity\ResumeProject }
                - { alias: ResumeReference, type: App\Recruit\Domain\Entity\ResumeReference }
                - { alias: ResumeSkill, type: App\Recruit\Domain\Entity\ResumeSkill }
                - { alias: Skill, type: App\Recruit\Domain\Entity\Skill }
                - { alias: Role, type: App\Role\Domain\Entity\Role }
                - { alias: Project, type: App\Task\Domain\Entity\Project }
                - { alias: Sprint, type: App\Task\Domain\Entity\Sprint }
                - { alias: Task, type: App\Task\Domain\Entity\Task }
                - { alias: TaskRequest, type: App\Task\Domain\Entity\TaskRequest }
                - { alias: Health, type: App\Tool\Domain\Entity\Health }
                - { alias: UserAddress, type: App\User\Domain\Entity\Address }
                - { alias: SocialAccount, type: App\User\Domain\Entity\SocialAccount }
                - { alias: User, type: App\User\Domain\Entity\User }
                - { alias: UserAvatar, type: App\User\Domain\Entity\UserAvatar }
                - { alias: UserGroup, type: App\User\Domain\Entity\UserGroup }
                - { alias: UserProfile, type: App\User\Domain\Entity\UserProfile }
        areas: # to filter documented areas
            default:
                path_patterns:
                    - ^/api(?!/doc$)
            admin:
                path_patterns:
                    - ^/api(?!/doc$)
                with_attribute: false
                cache: { }
            frontend:
                path_patterns:
                    - ^/api(?!/doc$)
                with_attribute: false
                cache: { }

when@test: *dev
